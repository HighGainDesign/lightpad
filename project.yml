name: Lightpad
options:
  bundleIdPrefix: design.highgain
  developmentLanguage: en
targets:
  Lightpad:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Lightpad
    settings:
      base:
        DEVELOPMENT_TEAM: UQ654V3JGQ
        PRODUCT_BUNDLE_IDENTIFIER: design.highgain.lightpad
        INFOPLIST_FILE: Lightpad/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    scheme:
      storeKitConfiguration: Lightpad/TipProducts.storekit
    capabilities:
      - In-App Purchase
