<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1024" height="1024">
  <!-- Gray aluminum body fills entire icon — iOS clips to squircle -->
  <rect width="512" height="512" fill="#7A7A7A"/>
  <!-- Subtle top bevel -->
  <rect width="512" height="3" fill="#999" opacity="0.35"/>

  <!-- LED panel surface — iOS squircle path, inset ~40px for visible border -->
  <!-- This path traces an iOS-style superellipse (squircle) inset from edges -->
  <path d="
    M 40 140
    C 40 72 72 40 140 40
    L 372 40
    C 440 40 472 72 472 140
    L 472 372
    C 472 440 440 472 372 472
    L 140 472
    C 72 472 40 440 40 372
    Z
  " fill="#FFF8EE"/>
  <path d="
    M 48 144
    C 48 80 80 48 144 48
    L 368 48
    C 432 48 464 80 464 144
    L 464 368
    C 464 432 432 464 368 464
    L 144 464
    C 80 464 48 432 48 368
    Z
  " fill="#FFFCF5" opacity="0.5"/>

  <!-- Film strip diagonal -->
  <g transform="rotate(-18 256 256)">
    <rect x="10" y="222" width="492" height="76" rx="4" fill="#2A1E14"/>

    <!-- Sprocket holes TOP - backlit -->
    <rect x="32" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="64" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="96" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="128" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="160" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="192" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="224" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="256" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="288" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="320" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="352" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="384" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="416" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="448" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="480" y="227" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>

    <!-- Sprocket holes BOTTOM - backlit -->
    <rect x="32" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="64" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="96" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="128" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="160" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="192" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="224" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="256" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="288" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="320" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="352" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="384" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="416" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="448" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>
    <rect x="480" y="285" width="11" height="8" rx="2" fill="#FFF8EE" opacity="0.85"/>

    <!-- Negative frames -->
    <rect x="38" y="240" width="48" height="40" rx="2" fill="#4A3828" opacity="0.7"/>
    <rect x="100" y="240" width="48" height="40" rx="2" fill="#3A2818" opacity="0.8"/>
    <rect x="162" y="240" width="48" height="40" rx="2" fill="#4A3020" opacity="0.65"/>
    <rect x="224" y="240" width="48" height="40" rx="2" fill="#3A2818" opacity="0.75"/>
    <rect x="286" y="240" width="48" height="40" rx="2" fill="#4A3828" opacity="0.7"/>
    <rect x="348" y="240" width="48" height="40" rx="2" fill="#3A2018" opacity="0.8"/>
    <rect x="410" y="240" width="48" height="40" rx="2" fill="#4A3828" opacity="0.65"/>
  </g>

  <!-- Loupe: top-down cylindrical view -->
  <circle cx="300" cy="230" r="62" fill="#2A2A2A"/>
  <circle cx="300" cy="230" r="62" fill="none" stroke="#4A4A4A" stroke-width="3"/>
  <circle cx="300" cy="230" r="52" fill="#1E1E1E"/>
  <circle cx="300" cy="230" r="60" fill="none" stroke="#3A3A3A" stroke-width="1"/>
  <circle cx="300" cy="230" r="57" fill="none" stroke="#383838" stroke-width="1"/>
  <circle cx="300" cy="230" r="54" fill="none" stroke="#353535" stroke-width="1"/>
  <circle cx="300" cy="230" r="42" fill="#3A5060" opacity="0.45"/>
  <ellipse cx="288" cy="218" rx="20" ry="12" fill="white" opacity="0.12" transform="rotate(-25 288 218)"/>
  <circle cx="300" cy="230" r="10" fill="#FFF8EE" opacity="0.5"/>
  <circle cx="300" cy="230" r="5" fill="#FFFCF5" opacity="0.7"/>
</svg>
